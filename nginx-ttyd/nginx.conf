worker_processes 1;

pid logs/nginx.pid;
error_log logs/error.log info;

events {
  worker_connections 1024;
}

http {
  include /opt/homebrew/etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log logs/access.log;
  sendfile on;
  keepalive_timeout 65;

  server {
    listen 7680;
    server_name _;

    location / {
      proxy_pass http://127.0.0.1:7682;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Accept-Encoding "";

      sub_filter_once on;
      sub_filter '</body>' '
<link rel="stylesheet" href="/ttyd-mobile.css?v=6" />
<div id="ttyd-mobile-toolbar" aria-label="Terminal mobile controls">
  <button type="button" id="ttyd-btn-ctrlc">Ctrl+C</button>
  <button type="button" id="ttyd-btn-esc">Esc</button>
  <button type="button" id="ttyd-btn-tab">Tab</button>
  <button type="button" id="ttyd-btn-wrap">Wrap On</button>
  <button type="button" id="ttyd-btn-up">&#8593;</button>
  <button type="button" id="ttyd-btn-down">&#8595;</button>
  <button type="button" id="ttyd-btn-font-dec">A-</button>
  <button type="button" id="ttyd-btn-font-inc">A+</button>
  <div id="ttyd-font-size-label">Font: --px</div>
</div>
<script>
  window.TTYD_MOBILE_FLAGS = {
    scrollbar: false,
    history: false
  };
</script>
<script src="/ttyd-mobile.js?v=6"></script>
</body>';
    }

    location = /ttyd-mobile.css {
      default_type text/css;
      alias /Users/nihal/Code/MobileDev/nginx-ttyd/ttyd-mobile.css;
    }

    location = /ttyd-mobile.js {
      default_type application/javascript;
      alias /Users/nihal/Code/MobileDev/nginx-ttyd/ttyd-mobile.js;
    }

    location = /ttyd-history {
      proxy_pass http://127.0.0.1:17777/history;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
