worker_processes 1;

pid logs/nginx.pid;
error_log logs/error.log info;

events {
  worker_connections 1024;
}

http {
  include /opt/homebrew/etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log logs/access.log;
  sendfile on;
  keepalive_timeout 65;

  server {
    listen 7680;
    server_name _;

    location / {
      proxy_pass http://127.0.0.1:7682;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Accept-Encoding "";

      sub_filter_once on;
      sub_filter '</body>' '
<style>
  #ttyd-mobile-toolbar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 99999;
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
    padding: 10px;
    background: rgba(20, 20, 20, 0.95);
    backdrop-filter: blur(4px);
    border-top: 1px solid rgba(255, 255, 255, 0.2);
    box-sizing: border-box;
  }
  #ttyd-mobile-toolbar button {
    min-height: 52px;
    border: 0;
    border-radius: 10px;
    background: #2f2f2f;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    touch-action: manipulation;
  }
  body {
    padding-bottom: 84px !important;
    box-sizing: border-box;
  }
</style>
<div id="ttyd-mobile-toolbar" aria-label="Terminal mobile controls">
  <button type="button" id="ttyd-btn-ctrlc">Ctrl+C</button>
  <button type="button" id="ttyd-btn-esc">Esc</button>
  <button type="button" id="ttyd-btn-tab">Tab</button>
  <button type="button" id="ttyd-btn-up">&#8593;</button>
  <button type="button" id="ttyd-btn-down">&#8595;</button>
</div>
<script>
  (function () {
    function sendSeq(seq) {
      if (window.term && typeof window.term.input === "function") {
        window.term.input(seq);
        if (typeof window.term.focus === "function") {
          window.term.focus();
        }
      }
    }

    window.__ttydMobileSendSeq = sendSeq;

    function bind(id, seq) {
      var el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("click", function () {
        sendSeq(seq);
      });
    }

    bind("ttyd-btn-ctrlc", "\\x03");
    bind("ttyd-btn-esc", "\\x1b");
    bind("ttyd-btn-tab", "\\x09");
    bind("ttyd-btn-up", "\\x1b[A");
    bind("ttyd-btn-down", "\\x1b[B");

    window.addEventListener("load", function () {
      window.dispatchEvent(new Event("resize"));
    });
  })();
</script>
</body>';
    }
  }
}
